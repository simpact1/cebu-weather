name: Typhoon Status Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh typhoon status on production
        env:
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -f -sS -X POST "https://weather.cebuplanner.com/api/typhoon-refresh" \
            -H "Authorization: Bearer ${REFRESH_SECRET}")
          echo "Typhoon refresh response:"
          echo "${response}"
